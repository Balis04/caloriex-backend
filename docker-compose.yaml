services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: caloriex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d caloriex"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    image: caloriex-backend:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/caloriex
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      USDA_API_KEY: ${USDA_API_KEY}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI:-https://dev-s6p5lk76jv2ydpek.us.auth0.com/}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}

volumes:
  postgres_data:

